<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>cloudsysncd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2334d399'/><stop offset='100%' stop-color='%23059669'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='%230c0f16'/><path d='M65 35a20 20 0 01-30 17.3' stroke='url(%23g)' stroke-width='7' stroke-linecap='round' fill='none'/><path d='M35 65a20 20 0 0130-17.3' stroke='url(%23g)' stroke-width='7' stroke-linecap='round' fill='none'/><polygon points='38,46 28,52 38,58' fill='%2334d399'/><polygon points='62,42 72,48 62,54' fill='%2334d399'/></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0d12;
      --bg-subtle: #0e1219;
      --surface: rgba(255,255,255,0.03);
      --surface-hover: rgba(255,255,255,0.06);
      --surface-active: rgba(255,255,255,0.08);
      --glass: rgba(15,20,30,0.8);
      --glass-border: rgba(255,255,255,0.06);
      --accent: #34d399;
      --accent-soft: rgba(52,211,153,0.1);
      --accent-softer: rgba(52,211,153,0.06);
      --text: #e8ecf4;
      --text-2: #8892a4;
      --text-3: #4a5568;
      --border: rgba(255,255,255,0.06);
      --error: #f87171;
      --error-bg: rgba(248,113,113,0.08);
      --error-border: rgba(248,113,113,0.15);
      --radius: 14px;
      --radius-sm: 10px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 50% -5%, rgba(52,211,153,0.06), transparent),
        radial-gradient(ellipse 30% 50% at 90% 100%, rgba(52,211,153,0.03), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .container {
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* ── Screens ── */
    .screen { display: none; opacity: 0; }
    #pair-screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100dvh - 4rem);
      text-align: center;
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    #main-screen.active {
      display: flex;
      flex-direction: column;
      height: calc(100dvh - 4rem);
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 0.5rem; }
    #pair-screen .logo { justify-content: center; margin-bottom: 1rem; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #059669);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 24px rgba(52,211,153,0.15), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo-text { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.03em; color: #fff; }

    /* ── Pair Screen ── */
    .subtitle {
      color: var(--text-2);
      font-size: 0.88rem;
      margin-bottom: 2rem;
      line-height: 1.6;
      max-width: 280px;
    }
    .status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0.5rem 0.9rem; border-radius: 20px;
      font-size: 0.8rem; font-weight: 500;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }
    .status-pill.waiting { background: var(--surface); border: 1px solid var(--border); color: var(--text-2); }
    .status-pill.working { background: var(--accent-soft); border: 1px solid rgba(52,211,153,0.2); color: var(--accent); }
    .status-pill.success { background: var(--accent-soft); border: 1px solid rgba(52,211,153,0.25); color: var(--accent); }
    .status-pill.error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .status-pill.working .status-dot { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .pin-group { display: flex; gap: 12px; justify-content: center; margin: 0 0 2rem; }
    .pin-input {
      width: 48px; height: 56px;
      text-align: center; font-size: 1.3rem; font-weight: 600;
      font-family: var(--mono);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: #fff; outline: none;
      transition: all 0.2s ease;
      caret-color: var(--accent);
    }
    .pin-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-softer); background: var(--surface-hover); }
    .pin-input.filled { border-color: rgba(52,211,153,0.4); background: var(--accent-softer); color: var(--accent); }
    .pin-input.shake { animation: shake 0.4s ease; }
    @keyframes shake { 20%,60% { transform: translateX(-4px); } 40%,80% { transform: translateX(4px); } }

    .btn {
      width: 100%; max-width: 320px;
      padding: 0.85rem; border: none; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease; letter-spacing: -0.01em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #059669);
      color: #fff;
      box-shadow: 0 4px 16px rgba(52,211,153,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-primary:hover { box-shadow: 0 6px 24px rgba(52,211,153,0.2); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: var(--surface-active); color: var(--text-3); cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Main Header ── */
    .main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .main-header .logo { margin-bottom: 0; }
    .conn-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.35rem 0.7rem; border-radius: 20px;
      font-size: 0.75rem; font-weight: 500;
      background: var(--accent-softer); border: 1px solid rgba(52,211,153,0.12);
      color: var(--accent);
    }
    .conn-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); }

    /* ── Section Header ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; padding: 0 0.15rem;
    }
    .section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); }
    .section-actions { display: flex; gap: 8px; }
    .refresh-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-3); width: 34px; height: 34px;
      border-radius: var(--radius-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: rgba(52,211,153,0.3); color: var(--accent); background: var(--accent-softer); }
    .refresh-btn:active { transform: scale(0.92); }
    .refresh-btn.spinning svg { animation: spin 0.6s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── File List ── */
    .file-list {
      list-style: none; flex: 1; overflow-y: auto;
      overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
      padding-right: 4px;
    }
    .file-list::-webkit-scrollbar { width: 5px; }
    .file-list::-webkit-scrollbar-track { background: transparent; }
    .file-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .file-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    .file-item {
      display: flex; align-items: center; gap: 12px;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }
    .file-item:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.1); }
    .file-item:active { transform: scale(0.995); }
    .file-item.downloading { opacity: 0.5; pointer-events: none; }
    .file-item.dir-item {
      cursor: default; background: transparent; border-color: transparent;
      padding: 0.35rem 0.5rem; margin-bottom: 2px;
    }
    .file-item.dir-item:hover { background: transparent; border-color: transparent; }

    .file-content-wrapper { flex: 1; min-width: 0; }
    .file-name { font-size: 0.88rem; font-weight: 500; word-break: break-all; color: var(--text); line-height: 1.4; }
    .file-meta { color: var(--text-3); font-size: 0.75rem; margin-top: 3px; }
    .file-dl {
      color: var(--accent); font-size: 0.8rem; font-weight: 500;
      white-space: nowrap; padding: 0.3rem 0.7rem;
      border-radius: 8px; background: var(--accent-softer);
      opacity: 0; transition: opacity 0.15s;
    }
    .file-item:hover .file-dl { opacity: 1; }
    .dir-name {
      color: var(--text-2); font-size: 0.88rem; font-weight: 600;
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      user-select: none;
    }
    .dir-chevron {
      width: 16px; height: 16px; transition: transform 0.2s ease; flex-shrink: 0;
    }
    .dir-item.collapsed .dir-chevron { transform: rotate(-90deg); }
    .file-item.dir-child-hidden { display: none; }
    .indent-1 { margin-left: 1.25rem; }
    .indent-2 { margin-left: 2.5rem; }
    .indent-3 { margin-left: 3.75rem; }

    /* ── Checkbox (hidden by default) ── */
    .file-checkbox { display: none; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; cursor: pointer; z-index: 10; opacity: 0; }
    .file-checkbox-label {
      display: none; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; background: var(--surface-hover);
      border: 2px solid rgba(255,255,255,0.12); border-radius: 6px;
      cursor: pointer; align-items: center; justify-content: center;
      transition: all 0.15s; z-index: 9;
    }
    .file-checkbox-label svg { width: 12px; height: 12px; fill: none; stroke: #fff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transition: opacity 0.15s; }
    .file-checkbox:checked + .file-checkbox-label { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-softer); }
    .file-checkbox:checked + .file-checkbox-label svg { opacity: 1; }
    .file-checkbox:focus + .file-checkbox-label { border-color: var(--accent); }
    .dir-item .file-checkbox, .dir-item .file-checkbox-label { display: none !important; }
    .file-item.selected { border-color: rgba(52,211,153,0.3); background: var(--accent-softer); }

    /* ── Selection Mode ── */
    .file-list.selection-mode .file-item { padding-left: 44px; }
    .file-list.selection-mode .file-item.dir-item { padding-left: 34px; }
    .file-list.selection-mode .file-item .file-checkbox { display: block; }
    .file-list.selection-mode .file-item .file-checkbox-label { display: flex; }

    .selection-bar {
      position: fixed; left: 0; right: 0;
      background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .selection-bar.active { transform: translateY(0); }
    .selection-bar.top-bar { top: 0; transform: translateY(-100%); border-bottom: 1px solid var(--glass-border); }
    .selection-bar.top-bar.active { transform: translateY(0); }
    .selection-bar:not(.top-bar) { bottom: 0; transform: translateY(100%); border-top: 1px solid var(--glass-border); }
    .selection-info { display: flex; align-items: center; gap: 0.5rem; color: var(--text); font-size: 0.85rem; font-weight: 500; }
    .selection-count { background: var(--accent); color: #fff; padding: 0.15rem 0.55rem; border-radius: 12px; font-size: 0.75rem; min-width: 24px; text-align: center; font-weight: 600; }
    .selection-actions { display: flex; align-items: center; gap: 0.75rem; }

    .btn-secondary {
      background: var(--surface); color: var(--text-2); border: 1px solid var(--border);
      padding: 0.4rem 0.8rem; border-radius: 8px; font-family: var(--font);
      font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { background: var(--surface-hover); color: var(--text); border-color: rgba(255,255,255,0.1); }
    .btn-batch {
      background: var(--accent); color: #fff; border: none;
      padding: 0.55rem 1.2rem; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(52,211,153,0.15);
    }
    .btn-batch:hover { box-shadow: 0 4px 20px rgba(52,211,153,0.2); transform: translateY(-1px); }
    .btn-batch:active { transform: translateY(0); }
    .btn-batch:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-close { background: none; border: none; color: var(--text-3); cursor: pointer; padding: 4px; border-radius: 6px; transition: all 0.15s; }
    .btn-close:hover { color: var(--text); background: var(--surface-hover); }

    /* ── States ── */
    .loading { text-align: center; color: var(--text-3); padding: 3rem 1rem; font-size: 0.85rem; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-3); font-size: 0.85rem; line-height: 1.7; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3; }

    /* ── Toast ── */
    .toast-container { position: fixed; top: 1.25rem; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .toast {
      padding: 0.6rem 1.1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
      max-width: 320px; text-align: center;
    }
    .toast.ok { background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.2); color: var(--accent); }
    .toast.err { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error); }
    .toast.info { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: var(--text-2); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(-10px); } }

    /* ── Responsive ── */
    @media (min-width: 768px) {
      .container { padding: 2.5rem 3rem; }
      .file-item { padding: 0.85rem 1.15rem; }
      .file-name { font-size: 0.9rem; }
      .file-meta { font-size: 0.78rem; }
      .pin-input { width: 54px; height: 60px; font-size: 1.5rem; border-radius: 12px; }
      .pin-group { gap: 14px; }
      .file-dl { opacity: 0; }
    }
    @media (max-width: 480px) {
      .container { padding: 1rem; }
      .main-header { margin-bottom: 1rem; }
      .file-dl { opacity: 0.7; padding: 0.2rem 0.5rem; font-size: 0.75rem; }
      .file-item { padding: 0.65rem 0.75rem; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="toast-container" id="toasts"></div>
  <div class="container">
    <div id="pair-screen" class="screen">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="logo-text">cloudsysncd</span>
      </div>
      <p class="subtitle">输入配对 PIN 码，建立端到端加密连接</p>
      <div id="pair-status" class="status-pill waiting">
        <span class="status-dot"></span>
        <span id="pair-status-text">等待输入 PIN 码</span>
      </div>
      <div class="pin-group" id="pin-group">
        <input class="pin-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="pin-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="pin-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="pin-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="pin-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        <input class="pin-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      </div>
      <button id="pair-btn" class="btn btn-primary" disabled>配对</button>
    </div>

    <div id="main-screen" class="screen">
      <div class="selection-bar top-bar" id="top-selection-bar">
        <div class="selection-info">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
          <span id="top-selection-text">选择文件</span>
        </div>
        <div class="selection-actions">
          <button class="btn-secondary" id="select-all-btn">全选</button>
          <button class="btn-secondary" id="select-none-btn">清空</button>
          <button class="btn-close" id="close-top-selection-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </div>

      <div class="main-header">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <span class="logo-text">cloudsysncd</span>
        </div>
        <span class="conn-badge"><span class="conn-dot"></span>已加密</span>
      </div>
      <div class="section-header">
        <span class="section-title">共享文件</span>
        <div class="section-actions">
          <button class="btn-secondary" id="toggle-selection-mode-btn">选择</button>
          <button class="refresh-btn" id="refresh-files-btn" onclick="loadFiles()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
          </button>
        </div>
      </div>
      <ul class="file-list" id="file-list">
        <li class="loading">加载中...</li>
      </ul>
    </div>

    <div class="selection-bar" id="bottom-selection-bar">
      <div class="selection-info">
        <span class="selection-count" id="selection-count">0</span>
        <span>已选择</span>
      </div>
      <div class="selection-actions">
        <button class="btn-secondary" id="clear-selection-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <button class="btn-batch" id="batch-download-btn" disabled>批量下载</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
